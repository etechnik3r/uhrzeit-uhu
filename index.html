<!DOCTYPE html>
<!--
  ============================================================================
  Uhrzeit-Uhu: Der Zeitreisen-Express
  ----------------------------------------------------------------------------
  Kindgerechtes Lernspiel (Grundschule) zum Lesen/Einstellen der Uhrzeit.
  Struktur (dieses File) / Aussehen (style.css) / Logik (game.js) getrennt.

  Bedienung: einen Zeiger ANTIPPEN (wird orange) und am Zifferblatt ZIEHEN.
  Einstellungen (Schwierigkeit, 12/24h, Ziffernblatt) ueber das Menue ⚙️.

  Hinweis: Die ?v=NUMMER hinter style.css/game.js erzwingt frische Dateien
  (umgeht Browser-/CDN-Caches). Bei jeder Aenderung die Nummer erhoehen.
  ============================================================================
-->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Lernspiel zum Uhrzeit-Lesen fuer Kinder im Grundschulalter.">
  <meta name="theme-color" content="#9cc0f0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Uhrzeit-Uhu: Der Zeitreisen-Express</title>

  <!-- Kindgerechte, serifenlose Schriften (System-Fallback bei Offline). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=7">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦉</text></svg>">
</head>

<body>

  <!-- ====================================================================
       1) TOP-BAR: Owl, Punkte ⭐ + Rekord 🏆 (antippbar = Erklaerung),
            grosser Menue-Button ⚙️.
       ==================================================================== -->
  <header class="top-bar">
    <div class="marke">
      <span class="marke-emoji" aria-hidden="true">🦉</span>
      <span class="marke-text">Uhrzeit-Uhu</span>
    </div>

    <div class="status">
      <button type="button" class="stat" id="stat-punkte" aria-label="Was bedeuten die Sterne?">
        <span class="stat-icon" aria-hidden="true">⭐</span>
        <span class="stat-wert" id="anzeige-punkte">0</span>
      </button>
      <button type="button" class="stat" id="stat-rekord" aria-label="Was bedeutet der Pokal?">
        <span class="stat-icon" aria-hidden="true">🏆</span>
        <span class="stat-wert" id="anzeige-rekord">0</span>
      </button>
    </div>

    <button type="button" class="menue-button" id="button-einstellungen" aria-label="Menü öffnen">
      <span class="menue-icon" aria-hidden="true">⚙️</span>
    </button>
  </header>


  <!-- ====================================================================
       2) MAIN: Abfahrtszeit (gross, antippbar = vorlesen) + grosse Uhr
       ==================================================================== -->
  <main class="haupt-bereich">

    <button type="button" class="ziel-anzeige" id="button-vorlesen" aria-label="Abfahrtszeit anhören">
      <span class="ziel-label">🚂 ABFAHRT</span>
      <span class="ziel-zeit" id="anzeige-ziel">08:00</span>
      <span class="ziel-hoeren">🔊 Hören</span>
    </button>

    <section class="uhr-bereich" aria-label="Analoge Uhr">
      <svg id="uhr-svg" class="uhr-svg" viewBox="0 0 200 200" role="img"
           aria-label="Analoge Uhr zum Einstellen der Zeit">
        <rect x="0" y="0" width="200" height="200" fill="transparent"></rect>
        <circle cx="100" cy="100" r="97" class="uhr-rand"></circle>
        <circle cx="100" cy="100" r="90" class="uhr-blatt"></circle>
        <g id="zifferblatt-markierungen"></g>
        <line id="zeiger-stunde" class="zeiger zeiger-stunde" x1="100" y1="100" x2="100" y2="54"></line>
        <line id="zeiger-minute" class="zeiger zeiger-minute" x1="100" y1="100" x2="100" y2="28"></line>
        <circle id="uhr-kappe" cx="100" cy="100" r="7" class="uhr-mitte"></circle>
      </svg>

      <p class="hinweis" id="hinweis-text" role="status" aria-live="polite">
        👆 Tippe einen Zeiger an
      </p>
    </section>
  </main>


  <!-- ====================================================================
       3) BOTTOM: Bahnhof mit (SVG-)Zug + Abfahrt-Button
            Der Zug faehrt nach LINKS (Lok voran). Bei neuer Aufgabe faehrt
            ein neuer Zug von rechts ein und haelt an.
       ==================================================================== -->
  <footer class="steuerung">
    <div class="bahnhof" aria-hidden="true">
      <div class="gleis"></div>
      <!-- SVG-Zug: faehrt nach LINKS (Front/Lok ist links). -->
      <svg class="zug" id="zug" viewBox="0 0 214 64" aria-hidden="true">
        <!-- Rauchwoelkchen -->
        <circle class="rauch" cx="30" cy="10" r="5"></circle>
        <circle class="rauch" cx="40" cy="6"  r="4"></circle>

        <!-- LOK (links, Front zeigt nach links) -->
        <polygon class="lok-front" points="2,50 16,50 16,38"></polygon>
        <rect class="lok-koerper" x="14" y="28" width="42" height="20" rx="9"></rect>
        <rect class="lok-schlot"  x="22" y="13" width="9"  height="16" rx="2"></rect>
        <rect class="lok-schlot-kappe" x="19" y="11" width="15" height="5" rx="2"></rect>
        <rect class="lok-dom" x="38" y="20" width="8" height="9" rx="3"></rect>
        <rect class="lok-kabine" x="50" y="16" width="24" height="32" rx="4"></rect>
        <rect class="lok-dach" x="47" y="12" width="30" height="8" rx="3"></rect>
        <rect class="lok-fenster" x="55" y="22" width="14" height="11" rx="2"></rect>
        <circle class="rad" cx="26" cy="52" r="7"></circle>
        <circle class="rad" cx="48" cy="52" r="7"></circle>
        <circle class="rad-klein" cx="66" cy="53" r="5"></circle>

        <!-- WAGGON 1 -->
        <rect class="kupplung" x="76" y="44" width="10" height="3" rx="1.5"></rect>
        <rect class="waggon-a" x="84" y="22" width="54" height="24" rx="5"></rect>
        <rect class="waggon-dach" x="82" y="18" width="58" height="6" rx="3"></rect>
        <rect class="fenster" x="92"  y="27" width="11" height="10" rx="2"></rect>
        <rect class="fenster" x="106" y="27" width="11" height="10" rx="2"></rect>
        <rect class="fenster" x="120" y="27" width="11" height="10" rx="2"></rect>
        <circle class="rad" cx="98"  cy="52" r="6"></circle>
        <circle class="rad" cx="124" cy="52" r="6"></circle>

        <!-- WAGGON 2 -->
        <rect class="kupplung" x="138" y="44" width="10" height="3" rx="1.5"></rect>
        <rect class="waggon-b" x="146" y="22" width="54" height="24" rx="5"></rect>
        <rect class="waggon-dach" x="144" y="18" width="58" height="6" rx="3"></rect>
        <rect class="fenster" x="154" y="27" width="11" height="10" rx="2"></rect>
        <rect class="fenster" x="168" y="27" width="11" height="10" rx="2"></rect>
        <rect class="fenster" x="182" y="27" width="11" height="10" rx="2"></rect>
        <circle class="rad" cx="160" cy="52" r="6"></circle>
        <circle class="rad" cx="186" cy="52" r="6"></circle>
      </svg>
    </div>

    <button type="button" class="abfahrt-button" id="button-abfahrt">
      <span class="abfahrt-icon" aria-hidden="true">🚂</span> Abfahrt!
    </button>
  </footer>


  <!-- Kleines Erklaer-Fenster (Popover) fuer ⭐ / 🏆 -->
  <div class="popover" id="popover" role="status" hidden></div>


  <!-- ====================================================================
       EINSTELLUNGS-SEITE (Vollbild-Overlay, geschlossen per Default)
       ==================================================================== -->
  <div class="modal-overlay" id="einstellungen" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Einstellungen">
      <header class="modal-kopf">
        <h2 class="modal-titel">⚙️ Einstellungen</h2>
        <button type="button" class="modal-schliessen" id="einstellungen-zu" aria-label="Schließen">✕</button>
      </header>

      <div class="modal-inhalt">
        <!-- Schwierigkeit -->
        <section class="opt-gruppe">
          <h3 class="opt-titel">🎚️ Schwierigkeit</h3>
          <div class="opt-reihe">
            <button type="button" class="opt-karte" data-setting="level" data-wert="1">
              <span class="opt-icon">🟢</span><span class="opt-name">Leicht</span>
              <span class="opt-text">Volle &amp; halbe Stunden</span>
            </button>
            <button type="button" class="opt-karte" data-setting="level" data-wert="2">
              <span class="opt-icon">🟡</span><span class="opt-name">Mittel</span>
              <span class="opt-text">Auch Viertelstunden</span>
            </button>
            <button type="button" class="opt-karte" data-setting="level" data-wert="3">
              <span class="opt-icon">🔴</span><span class="opt-name">Schwer</span>
              <span class="opt-text">Alle 5 Minuten</span>
            </button>
          </div>
        </section>

        <!-- Zeitformat -->
        <section class="opt-gruppe">
          <h3 class="opt-titel">🕘 Zeitformat</h3>
          <div class="opt-reihe">
            <button type="button" class="opt-karte" data-setting="zeitformat" data-wert="12">
              <span class="opt-icon">☀️</span><span class="opt-name">12 Stunden</span>
              <span class="opt-text">1 bis 12 Uhr</span>
            </button>
            <button type="button" class="opt-karte" data-setting="zeitformat" data-wert="24">
              <span class="opt-icon">🌙</span><span class="opt-name">24 Stunden</span>
              <span class="opt-text">0 bis 24 Uhr</span>
            </button>
          </div>
        </section>

        <!-- Ziffernblatt -->
        <section class="opt-gruppe">
          <h3 class="opt-titel">🕰️ Ziffernblatt</h3>
          <div class="opt-reihe opt-reihe-vier">
            <button type="button" class="opt-karte" data-setting="blatt" data-wert="schlicht">
              <span class="opt-icon">⚪</span><span class="opt-name">Schlicht</span>
              <span class="opt-text">nur Striche</span>
            </button>
            <button type="button" class="opt-karte" data-setting="blatt" data-wert="zahlen">
              <span class="opt-icon">🔢</span><span class="opt-name">Zahlen</span>
              <span class="opt-text">1–12</span>
            </button>
            <button type="button" class="opt-karte" data-setting="blatt" data-wert="minuten">
              <span class="opt-icon">⏱️</span><span class="opt-name">Minuten</span>
              <span class="opt-text">mit Minutenstrichen</span>
            </button>
            <button type="button" class="opt-karte" data-setting="blatt" data-wert="zwanzigvier">
              <span class="opt-icon">🌍</span><span class="opt-name">24 Stunden</span>
              <span class="opt-text">13–24 innen</span>
            </button>
          </div>
        </section>
      </div>

      <button type="button" class="modal-fertig" id="einstellungen-fertig">Fertig 👍</button>
    </div>
  </div>

  <script src="game.js?v=7"></script>
</body>
</html>
