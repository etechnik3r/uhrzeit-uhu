<!DOCTYPE html>
<!--
  ============================================================================
  Uhrzeit-Uhu: Der Zeitreisen-Express
  ----------------------------------------------------------------------------
  Kindgerechtes Lernspiel (Grundschule) zum Lesen/Einstellen der Uhrzeit.

  Struktur (dieses File) / Aussehen (style.css) / Logik (game.js) sind getrennt.

  BEDIENUNG (fuer Erstklaesser, viele Symbole, wenig Text):
  - Man tippt EINEN Zeiger an -> er wird ORANGE (= ausgewaehlt).
  - Dann zieht man ihn am Zifferblatt auf die richtige Stelle.
      * grosser Zeiger (Minute): rastet in 5-Minuten-Schritten ein
      * kleiner Zeiger (Stunde): gleitet wie in echt zwischen die Stunden
        (z.B. bei "halb" steht er zwischen zwei Zahlen)
  - Die Abfahrtszeit kann man sich per 🔊 vorlesen lassen.
  - Stimmt die Zeit, faehrt der kleine Zug am Bahnhof los.
  ============================================================================
-->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Lernspiel zum Uhrzeit-Lesen fuer Kinder im Grundschulalter.">
  <meta name="theme-color" content="#2a6fdb">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Uhrzeit-Uhu: Der Zeitreisen-Express</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦉</text></svg>">
</head>

<body>

  <!-- ====================================================================
       1) TOP-BAR (kompakt, symbolisch): Owl, Punkte ⭐, Rekord 🏆, Level 1/2/3
       ==================================================================== -->
  <header class="top-bar">
    <div class="marke">
      <span class="marke-emoji" aria-hidden="true">🦉</span>
      <span class="marke-text">Uhrzeit-Uhu</span>
    </div>

    <!-- Punkte und Rekord als Symbol + grosse Zahl (ohne viel Text) -->
    <div class="status">
      <div class="stat" title="Punkte">
        <span class="stat-icon" aria-hidden="true">⭐</span>
        <span class="stat-wert" id="anzeige-punkte">0</span>
      </div>
      <div class="stat" title="Rekord">
        <span class="stat-icon" aria-hidden="true">🏆</span>
        <span class="stat-wert" id="anzeige-rekord">0</span>
      </div>
    </div>

    <!-- Level-Auswahl: aktive Stufe ist hervorgehoben (zeigt zugleich das Level) -->
    <nav class="level-auswahl" aria-label="Schwierigkeit waehlen">
      <button type="button" class="level-button" data-level="1" aria-label="Stufe 1">1</button>
      <button type="button" class="level-button" data-level="2" aria-label="Stufe 2">2</button>
      <button type="button" class="level-button" data-level="3" aria-label="Stufe 3">3</button>
    </nav>
  </header>


  <!-- ====================================================================
       2) MAIN: Abfahrtszeit (gross, antippbar zum Vorlesen) + grosse Uhr
       ==================================================================== -->
  <main class="haupt-bereich">

    <!-- Abfahrtszeit: die ganze Anzeige ist ein Button -> tippen = vorlesen -->
    <button type="button" class="ziel-anzeige" id="button-vorlesen"
            aria-label="Abfahrtszeit anhören">
      <span class="ziel-label">🚂 ABFAHRT</span>
      <span class="ziel-zeit" id="anzeige-ziel">08:00</span>
      <span class="ziel-hoeren">🔊 Hören</span>
    </button>

    <!-- Die interaktive analoge Uhr -->
    <section class="uhr-bereich" aria-label="Analoge Uhr">
      <svg id="uhr-svg" class="uhr-svg" viewBox="0 0 200 200" role="img"
           aria-label="Analoge Uhr zum Einstellen der Zeit">

        <!-- Unsichtbare Flaeche, damit Beruehrungen ueberall auf der Uhr zaehlen -->
        <rect x="0" y="0" width="200" height="200" fill="transparent"></rect>

        <circle cx="100" cy="100" r="96" class="uhr-rand"></circle>
        <circle cx="100" cy="100" r="90" class="uhr-blatt"></circle>

        <!-- Stundenmarkierungen + Ziffern 1..12 (per JavaScript erzeugt) -->
        <g id="zifferblatt-markierungen"></g>

        <!--
          Die ZEIGER. Antippen waehlt einen aus (er wird per "aktiv"-Klasse
          orange). Der ausgewaehlte Zeiger wird per JS nach oben sortiert,
          damit man ihn auch bei Ueberdeckung (z.B. 12:00) gut sieht.
        -->
        <line id="zeiger-stunde" class="zeiger zeiger-stunde"
              x1="100" y1="100" x2="100" y2="54"></line>
        <line id="zeiger-minute" class="zeiger zeiger-minute"
              x1="100" y1="100" x2="100" y2="28"></line>

        <!-- Mittelpunkt-Kappe (bleibt immer ganz oben) -->
        <circle id="uhr-kappe" cx="100" cy="100" r="7" class="uhr-mitte"></circle>
      </svg>

      <!-- EIN gemeinsamer Hinweis: zeigt den aktiven Zeiger bzw. das Feedback -->
      <p class="hinweis" id="hinweis-text" role="status" aria-live="polite">
        👆 Tippe einen Zeiger an
      </p>
    </section>
  </main>


  <!-- ====================================================================
       3) BOTTOM: kleiner Bahnhof mit Zug + grosser "Abfahrt!"-Button
       ==================================================================== -->
  <footer class="steuerung">

    <!-- Bahnhof-Szene: der Zug steht am Gleis und faehrt bei Erfolg los. -->
    <div class="bahnhof" aria-hidden="true">
      <span class="bahnhof-haus">🚉</span>
      <span class="zug" id="zug">🚂🚃🚃</span>
    </div>

    <!-- Pruef-Button: gruen + Zug = "losfahren" -->
    <button type="button" class="abfahrt-button" id="button-abfahrt">
      🚂 Abfahrt!
    </button>
  </footer>

  <script src="game.js"></script>
</body>
</html>
